{% extends "site/master.html" %}
{% block content %}
{% include "site/partials/header.html" %}

<div class="bg-white">
    <div class="container">
        <h2>Gerencie suas Turmas</h2>
        <a href="/criarTurma" class="btn btn-success">Configurar Turmas</a>

        <br>
        <br>
        <label for="turma">Selecionar Turma:</label>
        <select id="turma" name="turma">
            <option value="">Selecione uma turma</option>
            {% for turma in turmas %}
                <option value="{{ turma.id }}">{{ turma.nome }}</option>
            {% endfor %}
        </select>
        <input type="hidden" id="professor-id" value="{{ idProfessor }}">

        <div>
            <label for="link">Link para os alunos:</label>
            <input type="text" id="link" readonly placeholder="O link aparecerá aqui">
            <button onclick="copiarLink()">Copiar</button>
        </div>
    </div>
</div>
    <script>
        document.getElementById('turma').addEventListener('change', function() {
            var turmaId = this.value;
            var professorId = document.getElementById('professor-id').value;
            var linkInput = document.getElementById('link');

            if (turmaId) {
                var link = 'http://localhost:3000/turma/' + turmaId;
                linkInput.value = link;
            } else {
                linkInput.value = '';
            }
        });


        function copiarLink() {
            var linkInput = document.getElementById('link');
            linkInput.select();
            document.execCommand('copy');
            alert('Link copiado: ' + linkInput.value);
        }
    </script>


{% endblock %}
